<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Snake Game</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    h1 {
      margin-bottom: 10px;
    }

    #score {
      margin-bottom: 10px;
      font-size: 18px;
    }

    canvas {
      background: #222;
      border: 2px solid #555;
    }

    #info {
      margin-top: 10px;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <h1>Snake Game</h1>
  <div id="score">Score: 0</div>
  <canvas id="game" width="400" height="400"></canvas>
  <div id="info">Use arrow keys to move. Refresh page to restart.</div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");

    const tileSize = 20;
    const tileCount = canvas.width / tileSize;

    let snake = [{ x: 10, y: 10 }];
    let vx = 1;
    let vy = 0;
    let food = randomFood();
    let score = 0;
    let gameOver = false;

    document.addEventListener("keydown", keyDown);

    function keyDown(e) {
      switch (e.key) {
        case "ArrowLeft":
          if (vx === 1) break;
          vx = -1; vy = 0;
          break;
        case "ArrowRight":
          if (vx === -1) break;
          vx = 1; vy = 0;
          break;
        case "ArrowUp":
          if (vy === 1) break;
          vx = 0; vy = -1;
          break;
        case "ArrowDown":
          if (vy === -1) break;
          vx = 0; vy = 1;
          break;
      }
    }

    function randomFood() {
      return {
        x: Math.floor(Math.random() * tileCount),
        y: Math.floor(Math.random() * tileCount),
      };
    }

    function update() {
      if (gameOver) return;

      // Move snake head
      const head = { x: snake[0].x + vx, y: snake[0].y + vy };

      // Check wall collision
      if (
        head.x < 0 ||
        head.x >= tileCount ||
        head.y < 0 ||
        head.y >= tileCount
      ) {
        endGame();
        return;
      }

      // Check self collision
      for (let i = 0; i < snake.length; i++) {
        if (snake[i].x === head.x && snake[i].y === head.y) {
          endGame();
          return;
        }
      }

      // Add new head
      snake.unshift(head);

      // Check food
      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = "Score: " + score;
        food = randomFood();
      } else {
        // Remove tail
        snake.pop();
      }

      draw();
    }

    function draw() {
      // Clear
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw food
      ctx.fillStyle = "red";
      ctx.fillRect(
        food.x * tileSize,
        food.y * tileSize,
        tileSize,
        tileSize
      );

      // Draw snake
      ctx.fillStyle = "lime";
      snake.forEach((segment, index) => {
        ctx.fillRect(
          segment.x * tileSize,
          segment.y * tileSize,
          tileSize - 1,
          tileSize - 1
        );
      });

      if (gameOver) {
        ctx.fillStyle = "white";
        ctx.font = "30px Arial";
        ctx.textAlign = "center";
        ctx.fillText("Game Over", canvas.width / 2, canvas.height / 2);
      }
    }

    function endGame() {
      gameOver = true;
      draw();
    }

    // Game loop
    setInterval(update, 120);
  </script>
</body>
